<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thoth — Multi-tab</title>
<link rel="icon" href="assets/thoth_icon_256.png">
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  html, body, #root { height: 100%; margin: 0; overflow: hidden; }
  body { background: var(--base); color: var(--text); font-family: var(--font-ui); }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 5px; }
  *::-webkit-scrollbar-thumb:hover { background: var(--surface2); }
  *::-webkit-scrollbar-track { background: transparent; }
  /* Smoother native drag image — let the OS render translucent ghost */
  [draggable="true"] { -webkit-user-drag: element; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="tabs/data.js"></script>
  <script type="text/babel" src="tabs/state.jsx"></script>
  <script type="text/babel" src="tabs/json-tree.jsx"></script>
  <script type="text/babel" src="tabs/plugins.jsx"></script>
  <script type="text/babel" src="tabs/layout.jsx"></script>
  <script type="text/babel" src="tabs/tweaks-panel.jsx"></script>
  <script type="text/babel" src="tabs/app.jsx"></script>
</body>
</html>

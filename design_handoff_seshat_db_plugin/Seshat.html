<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seshat — Database plugin for Thoth</title>
<link rel="icon" href="assets/thoth_icon_256.png">
<link rel="stylesheet" href="thoth-tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: var(--base); overflow: hidden; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 5px; }
  *::-webkit-scrollbar-thumb:hover { background: var(--surface2); }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-corner { background: transparent; }
  /* shared utilities */
  .nofocus:focus { outline: none; }
  .seshat-kbd {
    font-family: var(--font-mono); font-size: 10px; padding: 1px 5px; border-radius: 3px;
    background: var(--surface0); color: var(--overlay2);
    border: 1px solid var(--surface1); line-height: 1;
  }
  .seshat-pulse { animation: seshat-pulse 1.4s ease-in-out infinite; }
  @keyframes seshat-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.45; }
  }
  .seshat-spin { animation: seshat-spin 0.9s linear infinite; }
  @keyframes seshat-spin {
    to { transform: rotate(360deg); }
  }
  /* density */
  :root[data-density="compact"]  { --row-h: 22px; --grid-h: 24px; }
  :root[data-density="comfortable"] { --row-h: 28px; --grid-h: 32px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="panes.jsx"></script>
  <script type="text/babel" src="editor.jsx"></script>
  <script type="text/babel" src="results.jsx"></script>
  <script type="text/babel" src="views.jsx"></script>
  <script type="text/babel" src="palette.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>

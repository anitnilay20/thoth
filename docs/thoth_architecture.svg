<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1850 1180" width="1850" height="1180">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
    <style>
      text { font-family: "Inter", system-ui, -apple-system, sans-serif; }
      .title { font-size: 30px; fill: #f8fafc; font-weight: 700; }
      .sub { font-size: 14px; fill: #64748b; }
      .cap { font-size: 13px; letter-spacing: 1.5px; }
      .h { font-size: 15px; font-weight: 600; }
      .b { font-size: 11px; fill: #cbd5e1; }
      .band-h { font-size: 19px; font-weight: 700; fill: #a78bfa; }
      .band-1 { font-size: 12.5px; fill: #e2e8f0; }
      .band-2 { font-size: 12px; fill: #94a3b8; }
      .note { font-size: 12.5px; fill: #cbd5e1; }
      .note-h { font-size: 14px; fill: #94a3b8; letter-spacing: 1px; }
      .lbl { font-size: 11px; fill: #64748b; }
    </style>
  </defs>

  <rect x="0" y="0" width="1850" height="1180" fill="#0a0a0a"/>
  <text x="925" y="46" text-anchor="middle" class="title">Thoth Architecture</text>
  <text x="925" y="70" text-anchor="middle" class="sub">egui desktop app · sandboxed WebAssembly plugins · one shared UI SDK</text>

  <!-- ============================ PRESENTATION ============================ -->
  <text x="60" y="98" class="cap" fill="#60a5fa">PRESENTATION · egui UI panels</text>
  <rect x="60" y="106" width="1730" height="120" rx="12" fill="#0c1322" stroke="#60a5fa" stroke-opacity="0.35" stroke-width="2"/>

  <rect x="80" y="124" width="270" height="86" rx="8" fill="#131c2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="96" y="150" class="h" fill="#60a5fa">Toolbar</text>
  <text x="96" y="172" class="b">• File ops · history nav</text>
  <text x="96" y="190" class="b">• Search box · theme toggle</text>

  <rect x="364" y="124" width="270" height="86" rx="8" fill="#131c2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="380" y="150" class="h" fill="#60a5fa">Sidebar</text>
  <text x="380" y="172" class="b">• Data sources · plugin tabs</text>
  <text x="380" y="190" class="b">• Recent files · bookmarks</text>

  <rect x="648" y="124" width="270" height="86" rx="8" fill="#131c2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="664" y="150" class="h" fill="#60a5fa">Central Panel</text>
  <text x="664" y="172" class="b">• JSON tree viewer</text>
  <text x="664" y="190" class="b">• Plugin table viewer · welcome</text>

  <rect x="932" y="124" width="270" height="86" rx="8" fill="#131c2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="948" y="150" class="h" fill="#60a5fa">Settings &amp; Marketplace</text>
  <text x="948" y="172" class="b">• Preferences dialog</text>
  <text x="948" y="190" class="b">• Plugin install / manage</text>

  <rect x="1216" y="124" width="270" height="86" rx="8" fill="#131c2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="1232" y="150" class="h" fill="#60a5fa">Status &amp; Notifications</text>
  <text x="1232" y="172" class="b">• Breadcrumbs · toasts</text>
  <text x="1232" y="190" class="b">• Consent prompts</text>

  <rect x="1500" y="124" width="270" height="86" rx="8" fill="#131c2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="1516" y="150" class="h" fill="#60a5fa">Theme System</text>
  <text x="1516" y="172" class="b">• Dark / light tokens</text>
  <text x="1516" y="190" class="b">• Andromeda palette</text>

  <line x1="925" y1="226" x2="925" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ====================== SHARED SDK BAND ====================== -->
  <text x="60" y="272" class="cap" fill="#a78bfa">SHARED UI LIBRARY · used by host AND plugins</text>
  <rect x="60" y="280" width="1730" height="92" rx="12" fill="#1a1535" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="84" y="316" class="band-h">thoth-plugin-sdk</text>
  <text x="320" y="316" class="band-1">type-safe component builders · serializable RenderNode DSL · theme tokens · PluginState / SettingsMap · #[derive(PluginMeta)]</text>
  <text x="84" y="346" class="band-2">Built once in Rust, rendered by both the host panels above and the WASM plugins below — a single source of truth for every widget and the wire format.</text>

  <line x1="925" y1="372" x2="925" y2="396" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================ APPLICATION ============================ -->
  <text x="60" y="418" class="cap" fill="#34d399">APPLICATION CORE</text>
  <rect x="60" y="426" width="1730" height="120" rx="12" fill="#0c1322" stroke="#34d399" stroke-opacity="0.35" stroke-width="2"/>

  <rect x="80" y="444" width="270" height="86" rx="8" fill="#131c2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="96" y="470" class="h" fill="#34d399">ThothApp + Tab Manager</text>
  <text x="96" y="492" class="b">• App state · window/tab orchestration</text>
  <text x="96" y="510" class="b">• Component lifecycle</text>

  <rect x="364" y="444" width="270" height="86" rx="8" fill="#131c2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="380" y="470" class="h" fill="#34d399">File Controller</text>
  <text x="380" y="492" class="b">• Type routing · parser select</text>
  <text x="380" y="510" class="b">• Lazy-load coordination</text>

  <rect x="648" y="444" width="270" height="86" rx="8" fill="#131c2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="664" y="470" class="h" fill="#34d399">Search Engine</text>
  <text x="664" y="492" class="b">• Text + JSONPath · parallel</text>
  <text x="664" y="510" class="b">• Highlight map (path + ranges)</text>

  <rect x="932" y="444" width="270" height="86" rx="8" fill="#131c2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="948" y="470" class="h" fill="#34d399">Settings &amp; Theme Store</text>
  <text x="948" y="492" class="b">• Persisted preferences</text>
  <text x="948" y="510" class="b">• Palette management</text>

  <rect x="1216" y="444" width="270" height="86" rx="8" fill="#131c2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="1232" y="470" class="h" fill="#34d399">MCP Server</text>
  <text x="1232" y="492" class="b">• AI-assistant tools</text>
  <text x="1232" y="510" class="b">• stdio transport</text>

  <rect x="1500" y="444" width="270" height="86" rx="8" fill="#131c2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="1516" y="470" class="h" fill="#34d399">Error Handler</text>
  <text x="1516" y="492" class="b">• Typed errors · recovery</text>
  <text x="1516" y="510" class="b">• User-facing messages</text>

  <line x1="925" y1="546" x2="925" y2="570" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================ PLUGIN SYSTEM ============================ -->
  <text x="60" y="592" class="cap" fill="#f59e0b">PLUGIN SYSTEM · sandboxed WebAssembly (wasmtime)</text>
  <rect x="60" y="600" width="1730" height="188" rx="12" fill="#0c1322" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="2"/>

  <rect x="80" y="618" width="270" height="154" rx="8" fill="#131c2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="96" y="644" class="h" fill="#f59e0b">Plugin Manager</text>
  <text x="96" y="666" class="b">• Discovery · registry</text>
  <text x="96" y="684" class="b">• Marketplace install / update</text>
  <text x="96" y="702" class="b">• Per-plugin state windows</text>

  <rect x="364" y="618" width="270" height="154" rx="8" fill="#131c2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="380" y="644" class="h" fill="#f59e0b">WASM Runtime</text>
  <text x="380" y="666" class="b">• wasmtime engine</text>
  <text x="380" y="684" class="b">• Fuel limits · sandbox</text>
  <text x="380" y="702" class="b">• Component model (WIT)</text>

  <rect x="648" y="618" width="270" height="154" rx="8" fill="#131c2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="664" y="644" class="h" fill="#f59e0b">Capabilities (exports)</text>
  <text x="664" y="666" class="b">• file-loader · file-viewer</text>
  <text x="664" y="684" class="b">• data-source · ui-component</text>
  <text x="664" y="702" class="b">• exporter · theme · tab-host</text>

  <rect x="932" y="618" width="270" height="154" rx="8" fill="#131c2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="948" y="644" class="h" fill="#f59e0b">Host Imports</text>
  <text x="948" y="666" class="b">• http-client · tcp-client</text>
  <text x="948" y="684" class="b">• plugin-storage · secure-storage</text>
  <text x="948" y="702" class="b">• db-runtime · ui-tabs</text>

  <rect x="1216" y="618" width="270" height="154" rx="8" fill="#131c2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1232" y="644" class="h" fill="#f59e0b">Policy &amp; Consent</text>
  <text x="1232" y="666" class="b">• Host allowlist · SSRF guard</text>
  <text x="1232" y="684" class="b">• Rate limits</text>
  <text x="1232" y="702" class="b">• User approval prompts</text>

  <rect x="1500" y="618" width="270" height="154" rx="8" fill="#131c2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1516" y="644" class="h" fill="#f59e0b">Bundled Plugins</text>
  <text x="1516" y="666" class="b">• csv-loader (loader/viewer)</text>
  <text x="1516" y="684" class="b">• url-source (HTTP) · seshat (DB)</text>
  <text x="1516" y="702" class="b">• material-theme</text>

  <line x1="925" y1="788" x2="925" y2="812" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================ DATA ============================ -->
  <text x="60" y="834" class="cap" fill="#f472b6">DATA</text>
  <rect x="60" y="842" width="1730" height="120" rx="12" fill="#0c1322" stroke="#f472b6" stroke-opacity="0.35" stroke-width="2"/>

  <rect x="80" y="860" width="325" height="86" rx="8" fill="#131c2e" stroke="#f472b6" stroke-width="1.5"/>
  <text x="96" y="886" class="h" fill="#f472b6">File Detection</text>
  <text x="96" y="908" class="b">• NDJSON · JSON array / object</text>
  <text x="96" y="926" class="b">• Content sniffing</text>

  <rect x="421" y="860" width="325" height="86" rx="8" fill="#131c2e" stroke="#f472b6" stroke-width="1.5"/>
  <text x="437" y="886" class="h" fill="#f472b6">Lazy Loader</text>
  <text x="437" y="908" class="b">• On-demand parse · byte offsets</text>
  <text x="437" y="926" class="b">• Streaming reads</text>

  <rect x="762" y="860" width="325" height="86" rx="8" fill="#131c2e" stroke="#f472b6" stroke-width="1.5"/>
  <text x="778" y="886" class="h" fill="#f472b6">LRU Cache</text>
  <text x="778" y="908" class="b">• Bounded hot-node cache</text>
  <text x="778" y="926" class="b">• Eviction policy</text>

  <rect x="1103" y="860" width="325" height="86" rx="8" fill="#131c2e" stroke="#f472b6" stroke-width="1.5"/>
  <text x="1119" y="886" class="h" fill="#f472b6">Format Handlers</text>
  <text x="1119" y="908" class="b">• NDJSON &amp; JSON parsers</text>
  <text x="1119" y="926" class="b">• Line / element span index</text>

  <rect x="1444" y="860" width="325" height="86" rx="8" fill="#131c2e" stroke="#f472b6" stroke-width="1.5"/>
  <text x="1460" y="886" class="h" fill="#f472b6">File System</text>
  <text x="1460" y="908" class="b">• Cross-platform I/O</text>
  <text x="1460" y="926" class="b">• Permissions</text>

  <!-- ============================ FOOTER ============================ -->
  <rect x="60" y="992" width="1730" height="150" rx="12" fill="#0f1419" stroke="#374151" stroke-dasharray="5,5" stroke-width="2"/>
  <text x="84" y="1022" class="note-h">KEY DESIGN PRINCIPLES</text>
  <text x="84" y="1052" class="note">• Lazy loading — parse only visible / expanded nodes, so 500 MB+ files stay responsive.</text>
  <text x="84" y="1076" class="note">• One source of truth — host panels and WASM plugins share the thoth-plugin-sdk widgets &amp; RenderNode DSL.</text>
  <text x="84" y="1100" class="note">• Capability sandbox — plugins are WASM components; every host access (HTTP, TCP, storage) is an explicit, policy-gated import.</text>
  <text x="84" y="1124" class="note">• Parallel search — background memmem + JSONPath workers and precomputed highlights keep the UI smooth.</text>
</svg>

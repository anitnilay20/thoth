name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Runner OS"
        required: false
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - macos-latest
          - windows-latest
      save_baseline:
        description: "Save results as a named baseline (leave blank to skip)"
        required: false
        default: ""
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  bench:
    name: Benchmarks (${{ inputs.os }})
    runs-on: ${{ inputs.os || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-${{ inputs.os || 'ubuntu-latest' }}-stable

      - name: Run benchmarks
        run: cargo bench ${{ inputs.save_baseline != '' && format('-- --save-baseline {0}', inputs.save_baseline) || '' }}

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ inputs.os || 'ubuntu-latest' }}
          path: target/criterion/
          retention-days: 30

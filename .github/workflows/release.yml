name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact-name: thoth-windows-x64
            bundle-name: thoth.exe

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact-name: thoth-macos-x64
            bundle-name: Thoth.app

          - target: aarch64-apple-darwin
            os: macos-15 # macOS Sequoia 15.x Apple Silicon runners
            artifact-name: thoth-macos-arm64
            bundle-name: Thoth.app

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact-name: thoth-linux-x64
            bundle-name: thoth

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for changelog

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # sccache caches individual crate compilation units keyed on source hash —
      # unlike Swatinem (which keys on Cargo.lock), sccache survives Cargo.lock
      # bumps: unchanged crates like wasmtime still hit the cache even after
      # adding/removing other dependencies.
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      # Cache cargo registry and installed binaries (cargo-packager, cargo-component).
      # cache-targets is false because sccache handles compilation caching.
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "release-${{ runner.os }}"
          cache-targets: false
          cache-all-crates: true

      # Ensure we have the right target for cross-compilation
      - name: Add target for cross-compilation
        run: rustup target add ${{ matrix.target }}

      # Print system info for verification
      - name: Verify build environment
        run: |
          echo "=== System Details ==="
          uname -a
          echo ""
          echo "=== Rust Host Target ==="
          rustc --version --verbose | grep host
          echo ""
          echo "=== Architecture ==="
          uname -m && arch
          echo ""
          echo "=== Matrix Config ==="
          echo "Matrix Target: ${{ matrix.target }}"
          echo "Matrix OS: ${{ matrix.os }}"

      # cargo-binstall downloads pre-compiled binaries — no source compilation.
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@aaa84a43aec4955a42c5ffc65d258961e39f276e # v1.19.1

      # Install tools from pre-built binaries (~5s each vs 1–5 min from source)
      - name: Install cargo-packager
        run: cargo binstall cargo-packager --no-confirm --locked

      # macOS-specific dependencies
      # Note: cargo-packager handles DMG creation natively, no extra tools needed

      # Linux-specific dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Windows-specific setup - Install WiX for MSI creation (required by cargo-packager)
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          # Install WiX Toolset v3 for MSI creation (cargo-packager requires this)
          choco install wixtoolset -y
          # Add WiX to PATH (version may vary, using wildcard)
          $wixPath = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" | Select-Object -First 1 -ExpandProperty FullName
          if ($wixPath) {
            echo "$wixPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "WiX Toolset found at: $wixPath"
          }

      # Build main app first — cargo-component is absent so build.rs skips
      # plugin compilation. This keeps the heavy cranelift compile as the only
      # work in this step, letting sccache cache it cleanly.
      - name: Build release binary
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
        run: cargo build --release

      # Install cargo-component after the main build so it doesn't affect the
      # main build's sccache keys or add noise to the build.rs subprocess chain.
      - name: Install cargo-component
        run: cargo binstall cargo-component --no-confirm

      - name: Add wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      # Build WASM plugins explicitly with sccache so plugin crates are cached
      # independently of the main app build.
      - name: Build WASM plugins
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
        shell: bash
        run: |
          for plugin_dir in plugins/*/; do
            [ -f "$plugin_dir/Cargo.toml" ] || continue  # skip theme plugins
            plugin_name=$(basename "$plugin_dir")
            cargo component build --release --target wasm32-wasip1 \
              --manifest-path "$plugin_dir/Cargo.toml"
            wasm_name="${plugin_name//-/_}"
            dst="assets/plugins/$plugin_name"
            mkdir -p "$dst"
            cp "target/wasm32-wasip1/release/${wasm_name}.wasm" "$dst/plugin.wasm"
            cp "$plugin_dir/plugin.toml" "$dst/plugin.toml"
            [ -f "$plugin_dir/icon.png" ] && cp "$plugin_dir/icon.png" "$dst/icon.png" || true
          done

      # Create bundles for each platform
      - name: Create Windows MSI installer
        if: runner.os == 'Windows'
        env:
          RUST_LOG: cargo_packager=debug
        run: |
          # Create MSI installer using cargo-packager (format is 'wix' for MSI)
          cargo packager --release --formats wix -v
          New-Item -ItemType Directory -Force -Path artifacts

          # cargo-packager outputs MSI to target/release/ on Windows
          if (Test-Path "target\release\*.msi") {
            Copy-Item "target\release\*.msi" artifacts\
            Write-Host "MSI installer copied to artifacts/"
          } else {
            Write-Host "MSI not found, checking dist/ directory"
            if (Test-Path "dist\*.msi") {
              Copy-Item "dist\*.msi" artifacts\
            } else {
              Write-Host "MSI not found in either location"
              Get-ChildItem -Path target\release\ -Filter *.msi -Recurse | ForEach-Object { Write-Host $_.FullName }
            }
          }

          # Also copy the exe as fallback
          Copy-Item target\release\thoth.exe artifacts\

      - name: Create macOS DMG installer
        if: runner.os == 'macOS' && matrix.target == 'x86_64-apple-darwin'
        run: |
          # Build both app bundle and DMG using cargo-packager
          cargo packager --release --formats app,dmg
          mkdir -p artifacts

          # cargo-packager outputs to target/release/ directory
          echo "Listing target/release/ contents:"
          ls -la target/release/

          # Copy the DMG if it exists
          cp target/release/*.dmg artifacts/ 2>/dev/null || echo "DMG not found"

          # Copy the .app bundle to artifacts/ for tar.gz creation
          if [ -d "target/release/Thoth.app" ]; then
            cp -r target/release/Thoth.app artifacts/
            echo "Copied Thoth.app from target/release/"
          else
            echo "App bundle not found, checking for .app files:"
            find target/release -name "*.app" -type d
          fi

      - name: Create macOS ARM64 DMG installer
        if: runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin'
        run: |
          # Build both app bundle and DMG using cargo-packager
          cargo packager --release --formats app,dmg
          mkdir -p artifacts

          # cargo-packager outputs to target/release/ directory
          echo "Listing target/release/ contents:"
          ls -la target/release/

          # Copy the DMG if it exists
          cp target/release/*.dmg artifacts/ 2>/dev/null || echo "DMG not found"

          # Copy the .app bundle to artifacts/ for tar.gz creation
          if [ -d "target/release/Thoth.app" ]; then
            cp -r target/release/Thoth.app artifacts/
            echo "Copied Thoth.app from target/release/"
          else
            echo "App bundle not found, checking for .app files:"
            find target/release -name "*.app" -type d
          fi

      - name: Create Linux packages (deb)
        if: runner.os == 'Linux'
        run: |
          # Create deb package using cargo-packager
          cargo packager --release --formats deb
          mkdir -p artifacts

          # cargo-packager outputs to target/release/ directory
          cp target/release/*.deb artifacts/ 2>/dev/null || echo "DEB not found"

          # Also copy raw binary as fallback
          cp target/release/thoth artifacts/
          chmod +x artifacts/thoth

      # Create compressed archives
      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd artifacts
          7z a ../thoth-${{ matrix.target }}.zip *

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd artifacts
          if [ "${{ runner.os }}" = "macOS" ]; then
            tar -czf ../thoth-${{ matrix.target }}.tar.gz Thoth.app
          else
            tar -czf ../thoth-${{ matrix.target }}.tar.gz thoth
          fi

      # Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            *.zip
            *.tar.gz
            artifacts/*.dmg
            artifacts/*.msi
            artifacts/*.deb

  create-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Generate changelog
        id: changelog
        run: |
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Changes from ${{ steps.prev_tag.outputs.prev_tag }} to ${{ steps.get_version.outputs.version }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          # Get commit messages between tags
          git log --pretty=format:"- %s (%an)" ${{ steps.prev_tag.outputs.prev_tag }}..${{ github.sha }} >> CHANGELOG.md

          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Installation Instructions" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "> **Note for existing users**: Thoth includes automatic over-the-air (OTA) updates! You'll be notified when new versions are available and can update with one click directly from the app. The installers below are primarily for first-time installation." >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### macOS (Recommended: DMG Installer)" >> CHANGELOG.md
          echo "1. Download the appropriate DMG:" >> CHANGELOG.md
          echo "   - **Apple Silicon (M1/M2/M3)**: \`Thoth-aarch64-apple-darwin.dmg\`" >> CHANGELOG.md
          echo "   - **Intel**: \`Thoth-x86_64-apple-darwin.dmg\`" >> CHANGELOG.md
          echo "2. Open the DMG and drag Thoth.app to Applications" >> CHANGELOG.md
          echo "3. **Important**: Open Terminal and run:" >> CHANGELOG.md
          echo "   \`\`\`bash" >> CHANGELOG.md
          echo "   xattr -cr /Applications/Thoth.app" >> CHANGELOG.md
          echo "   \`\`\`" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "> ⚠️ **Gatekeeper Warning**: This app is not code-signed. You must remove the quarantine attribute using the command above before first launch." >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**Manual Installation**:" >> CHANGELOG.md
          echo "1. Download: \`thoth-aarch64-apple-darwin.tar.gz\` or \`thoth-x86_64-apple-darwin.tar.gz\`" >> CHANGELOG.md
          echo "2. Extract: \`tar -xzf thoth-*.tar.gz\`" >> CHANGELOG.md
          echo "3. **Important**: Remove quarantine: \`xattr -cr Thoth.app\`" >> CHANGELOG.md
          echo "4. Move to Applications: \`mv Thoth.app /Applications/\`" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Windows (Recommended: MSI Installer)" >> CHANGELOG.md
          echo "1. Download \`Thoth.msi\`" >> CHANGELOG.md
          echo "2. Double-click to install" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**Portable Version**:" >> CHANGELOG.md
          echo "1. Download \`thoth-x86_64-pc-windows-msvc.zip\`" >> CHANGELOG.md
          echo "2. Extract and run \`thoth.exe\`" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Linux (Recommended: DEB Package)" >> CHANGELOG.md
          echo "1. Download \`thoth_*_amd64.deb\`" >> CHANGELOG.md
          echo "2. Install: \`sudo dpkg -i thoth_*_amd64.deb\`" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**Portable Version**:" >> CHANGELOG.md
          echo "1. Download \`thoth-x86_64-unknown-linux-gnu.tar.gz\`" >> CHANGELOG.md
          echo "2. Extract: \`tar -xzf thoth-x86_64-unknown-linux-gnu.tar.gz\`" >> CHANGELOG.md
          echo "3. Make executable: \`chmod +x thoth\`" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### 🔄 Automatic Updates" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Thoth checks for updates automatically on startup and every 24 hours. When an update is available:" >> CHANGELOG.md
          echo "- You'll see a red notification badge on the settings button (⚙)" >> CHANGELOG.md
          echo "- The settings panel will open automatically to show the update details" >> CHANGELOG.md
          echo "- Click \"Download Update\" and then \"Install Update\" to upgrade seamlessly" >> CHANGELOG.md
          echo "- The update happens in the background with automatic binary replacement" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.prev_tag.outputs.prev_tag }}...${{ steps.get_version.outputs.version }}" >> CHANGELOG.md

          cat CHANGELOG.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Move artifacts to release directory
        run: |
          mkdir -p release
          find artifacts -name "*.zip" -exec cp {} release/ \;
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          find artifacts -name "*.dmg" -exec cp {} release/ \;
          find artifacts -name "*.msi" -exec cp {} release/ \;
          find artifacts -name "*.deb" -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.get_version.outputs.version }} \
            --title "Release ${{ steps.get_version.outputs.version }}" \
            --notes-file CHANGELOG.md \
            release/*
